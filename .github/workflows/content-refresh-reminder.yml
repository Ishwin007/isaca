name: Quarterly Content Refresh Reminder

on:
  schedule:
    - cron: '0 9 1 1,4,7,10 *'  # 9am UTC on 1st of Jan, Apr, Jul, Oct
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  create-reminder-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create content refresh reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Quarterly Reminder] Review and refresh ISACA content — ${today}`,
              body: [
                '## Quarterly Content Refresh Checklist',
                '',
                'Time to review the ISACA data files and update anything that has changed.',
                '',
                '### Pages to check on isaca.org',
                '',
                '- [ ] **Exam fees** — https://www.isaca.org/credentialing — check if CISA/CISM/CRISC/CGEIT/CDPSE/CCOA/AAIA/AAIR/AAISM prices have changed',
                '- [ ] **New certifications** — https://www.isaca.org/credentialing — check if any new certifications have launched',
                '- [ ] **Membership fees** — https://www.isaca.org/membership — check if annual/student fees have changed',
                '- [ ] **CPE policy** — https://www.isaca.org/credentialing/how-to-earn-cpe — check if requirements have changed',
                '- [ ] **Salary data** — https://www.isaca.org/credentialing — check if published salary figures have been updated',
                '',
                '### How to update',
                '',
                '1. Open Claude Code in the `isaca mcp` project folder',
                '2. Tell Claude what has changed (e.g. "CISA exam fee is now US$600")',
                '3. Claude will update the relevant group files',
                '4. Push to GitHub — Render will redeploy automatically',
                '',
                '### Files most likely to need updates',
                '',
                '- `isaca_data/group_certifications.txt` — exam fees, new certifications',
                '- `isaca_data/group_career_guide.txt` — salary data, comparison table',
                '- `isaca_data/group_membership.txt` — membership fees, CPE policy',
                '- `isaca_data/group_getting_certified.txt` — exam fees, study material prices',
                '',
                '> This issue was automatically created by GitHub Actions. Close it once the review is complete.',
              ].join('\n'),
              labels: ['content-refresh'],
            });
